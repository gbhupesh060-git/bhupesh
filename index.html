<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>School Website</title>

<style>
body{margin:0;font-family:sans-serif;background:#f5f5f5}

/* HEADER */
header{
display:flex;justify-content:space-between;
background:#002147;color:#fff;padding:10px;
position:sticky;top:0
}
nav a{color:white;margin:10px;text-decoration:none}

/* SLIDER */
.banner{height:300px;position:relative}
.banner img{position:absolute;width:100%;height:100%;opacity:0;transition:1s}
.banner img.active{opacity:1}

/* SECTION */
section{text-align:center;padding:30px}

/* GALLERY */
.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:10px;
}
.gallery img{
width:100%;border-radius:10px;cursor:pointer;
}

/* BUTTON */
.btn{
background:#002147;color:white;padding:10px;
margin:5px;border:none;cursor:pointer
}

/* MODAL */
#modal{
display:none;position:fixed;
width:100%;height:100%;
background:rgba(0,0,0,0.9);
justify-content:center;align-items:center;
}
#modal img{max-width:90%}

/* ADMIN PANEL */
#adminPanel{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:white;
padding:20px;
overflow:auto;
}

/* MOBILE */
@media(max-width:600px){
header{flex-direction:column}
}
</style>
</head>

<body>

<header>
<h2>LOGO</h2>
<nav>
<a href="#">Home</a>
<a href="#about">About</a>
<a href="#gallery">Gallery</a>
<a href="#contact">Contact</a>
</nav>
</header>

<!-- SLIDER -->
<div class="banner">
<img src="1.jpg" class="active">
<img src="2.jpg">
<img src="3.jpg">
<img src="4.jpg">
<img src="5.jpg">
</div>

<!-- ABOUT -->
<section id="about">
<h2>About</h2>
<p>Yahan apna school description likho</p>
</section>

<!-- GALLERY -->
<section id="gallery">
<h2>Gallery</h2>
<div class="gallery" id="galleryBox"></div>
<button class="btn" onclick="loadAll()">See All</button>
</section>

<!-- BUTTONS -->
<section>
<button class="btn" onclick="privateGallery()">Private</button>
<button class="btn">Awards</button>
<button class="btn">Summary</button>
</section>

<!-- CONTACT -->
<section id="contact">
<h2>Contact</h2>

<input id="name" placeholder="Name"><br>
<input id="mobile" placeholder="Mobile"><br>
<input id="address" placeholder="Address"><br>
<input id="email" placeholder="Email"><br>

<button class="btn" onclick="sendWhatsApp()">Send</button>

<br><br>

<a href="tel:9153631109">
<button class="btn">Call</button>
</a>

</section>

<!-- SOCIAL -->
<section>
<a href="#"><button class="btn">Facebook</button></a>
<a href="#"><button class="btn">Instagram</button></a>
<a href="https://wa.me/9153631109"><button class="btn">WhatsApp</button></a>
</section>

<!-- MODAL -->
<div id="modal" onclick="this.style.display='none'">
<img id="modalImg">
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel">
<h2>Admin Panel</h2>

<input type="file" id="imgInput">
<button onclick="addImage()">Add Image</button>

<br><br>
<button onclick="closeAdmin()">Close</button>
</div>

<script>

/* SLIDER */
let slides=document.querySelectorAll(".banner img");
let i=0;
setInterval(()=>{
slides[i].classList.remove("active");
i=(i+1)%slides.length;
slides[i].classList.add("active");
},10000);

/* GALLERY */
let images=[];

function loadImages(n){
let box=document.getElementById("galleryBox");
box.innerHTML="";
for(let i=0;i<n && i<images.length;i++){
let img=document.createElement("img");
img.src=images[i];
img.onclick=()=>show(img.src);
box.appendChild(img);
}
}

/* DEFAULT IMAGES */
for(let i=1;i<=10;i++){
images.push("images/"+i+".jpg");
}
loadImages(10);

function loadAll(){
loadImages(images.length);
}

/* MODAL */
function show(src){
document.getElementById("modal").style.display="flex";
document.getElementById("modalImg").src=src;
}

/* PRIVATE */
function privateGallery(){
let p=prompt("Password?");
if(p==="gunjanbhupeshshah"){
alert("Private Opened");
}else{
alert("Wrong Password");
}
}

/* WHATSAPP */
function sendWhatsApp(){
let msg=`Name:${name.value}%0AMobile:${mobile.value}%0AAddress:${address.value}%0AEmail:${email.value}`;
window.open(`https://wa.me/9153631109?text=${msg}`);
}

/* ADMIN ACCESS (HIDDEN) */
document.body.addEventListener("dblclick",()=>{
let code=prompt("Admin Code");
if(code==="admin123"){
document.getElementById("adminPanel").style.display="block";
}
});

/* ADMIN ADD IMAGE (DEMO ONLY) */
function addImage(){
let file=document.getElementById("imgInput").files[0];
if(file){
let url=URL.createObjectURL(file);
images.push(url);
loadImages(images.length);
}
}

function closeAdmin(){
document.getElementById("adminPanel").style.display="none";
}

</script>

</body>
</html>
