<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>School Gallery</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{font-family:sans-serif}

/* HEADER */
header{
position:sticky;top:0;z-index:100;
}

/* BANNER */
.banner{position:relative;height:300px;overflow:hidden}
.banner img{
position:absolute;
width:100%;height:100%;
object-fit:cover;
opacity:0;
transition:1s;
}
.banner img.active{opacity:1}

/* GALLERY */
.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
}
.gallery img{
width:100%;
border-radius:15px;
cursor:pointer;
transition:0.3s;
box-shadow:0 6px 15px rgba(0,0,0,0.2);
}
.gallery img:hover{
transform:scale(1.05);
}

/* MODAL */
#modal{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.9);
justify-content:center;
align-items:center;
z-index:1000;
}
#modal img{
max-width:90%;
border-radius:10px;
}

/* INPUT */
input{
width:250px;
}
</style>

</head>

<body class="bg-gray-100">

<!-- HEADER -->

<header class="bg-gradient-to-r from-purple-600 to-pink-600 text-white p-4 flex justify-between">
<h2 class="text-xl font-bold">My School</h2>
<nav>
<a href="#" class="mx-2">Home</a>
<a href="#gallery" class="mx-2">Gallery</a>
<a href="#contact" class="mx-2">Contact</a>
</nav>
</header>

<!-- BANNER -->

<div class="banner">
<img src="b1.jpg" class="active">
<img src="b2.jpg">
<img src="b3.jpg">
<img src="b4.jpg">
<img src="b5.jpg">
</div>

<!-- ABOUT -->

<section class="p-6 text-center">
<h2 class="text-2xl font-bold mb-2">About</h2>
<p>Yahan apne school ya gallery ka description likho.</p>
</section>

<!-- GALLERY -->

<section id="gallery" class="p-6 text-center">
<h2 class="text-2xl font-bold mb-4">Gallery</h2>

<div id="galleryBox" class="gallery"></div>

<div class="mt-5 space-x-2">
<button onclick="loadAll()" class="bg-purple-600 text-white px-4 py-2 rounded">See All</button>
<button onclick="privateGallery()" class="bg-pink-600 text-white px-4 py-2 rounded">Private</button>
<button onclick="loadAwards()" class="bg-blue-600 text-white px-4 py-2 rounded">Awards</button>
</div>
</section>

<!-- CONTACT -->

<section id="contact" class="p-6 text-center">
<h2 class="text-2xl font-bold mb-4">Contact</h2>

<input id="name" placeholder="Name" class="border p-2 m-1"><br> <input id="mobile" placeholder="Mobile" class="border p-2 m-1"><br> <input id="address" placeholder="Address" class="border p-2 m-1"><br> <input id="email" placeholder="Email" class="border p-2 m-1"><br>

<button onclick="sendWhatsApp()" class="bg-green-600 text-white px-4 py-2 rounded mt-2">Send</button>

</section>

<!-- FOOTER -->

<footer class="bg-purple-600 text-white text-center p-3">
© 2026 My School | All Rights Reserved
</footer>

<!-- MODAL -->

<div id="modal" onclick="this.style.display='none'">
<img id="modalImg">
</div>

<script>

/* ================= BANNER SLIDER ================= */
let slides=document.querySelectorAll(".banner img");
let i=0;
setInterval(()=>{
slides[i].classList.remove("active");
i=(i+1)%slides.length;
slides[i].classList.add("active");
},3000);

/* ================= GALLERY ================= */
let images=[];

// DEFAULT LOAD (1–1000)
function loadDefault(){
images=[];
for(let i=1;i<=1000;i++){
images.push("images/"+i+".jpg");
}
loadImages(20);
}
loadDefault();

function loadImages(n){
let box=document.getElementById("galleryBox");
box.innerHTML="";
for(let i=0;i<n && i<images.length;i++){
let img=document.createElement("img");
img.src=images[i];
img.onclick=()=>show(img.src);
box.appendChild(img);
}
}

function loadAll(){
loadImages(images.length);
}

/* ================= MODAL ================= */
function show(src){
document.getElementById("modal").style.display="flex";
document.getElementById("modalImg").src=src;
}

/* ================= PRIVATE ================= */
function privateGallery(){
let p=prompt("Enter Password");
if(p==="gunjanbhupeshshah"){
images=[];
for(let i=1;i<=50;i++){
images.push("private/p"+i+".jpg");
}
loadImages(images.length);
}else{
alert("Wrong Password");
}
}

/* ================= AWARDS ================= */
function loadAwards(){
images=[];
for(let i=1;i<=100;i++){
images.push("awards/a"+i+".jpg");
}
loadImages(images.length);
}

/* ================= WHATSAPP ================= */
function sendWhatsApp(){
let msg=`Name:${name.value}%0AMobile:${mobile.value}%0AAddress:${address.value}%0AEmail:${email.value}`;
window.open(`https://wa.me/9153631109?text=${msg}`);
}

</script>

</body>
</html>
